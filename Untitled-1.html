<!DOCTYPE html>
<html>
<body>
    <h3>Projectile Simulator</h3>
    <label>Gravity: </label><input type="range" id="grav" min="0" max="1" step="0.05" value="0.2">
    <label>Power: </label><input type="range" id="power" min="5" max="20" step="1" value="10">
    <button onclick="launch()">Launch!</button><br>

    <canvas id="gameCanvas" width="600" height="400" style="border:1px solid #000; background: #f0f0f0;"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let x, y, vx, vy;
        let active = false;

        function launch() {
            x = 50; y = 350; // Starting position (bottom left)
            let p = document.getElementById('power').value;
            vx = p * 0.8;    // Horizontal speed
            vy = -p * 1.2;   // Vertical speed (negative moves up)
            active = true;
        }

        function update() {
            if (active) {
                let g = parseFloat(document.getElementById('grav').value);
                
                x += vx;
                y += vy;
                vy += g; // Apply gravity to vertical speed

                // Ground detection
                if (y > 350) { y = 350; active = false; }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Ball
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, Math.PI * 2);
            ctx.fillStyle = "red";
            ctx.fill();
            ctx.closePath();
        }

        launch(); // Initialize
        update(); // Start loop
    </script>
</body>
</html>
